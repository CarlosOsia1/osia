name: Publish images

# Publica las imágenes Docker del api y el world-server en GHCR (ghcr.io/<owner>/osia-*)
# al hacer push a main o al taggear vX.Y.Z. El deploy (Hetzner/Fly) tira de estas imágenes.
# Requiere: nada extra — GITHUB_TOKEN ya tiene permiso de packages:write (declarado abajo).

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  images:
    name: Build & push (${{ matrix.app }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - app: api
            dockerfile: apps/api/Dockerfile
          - app: world-server
            dockerfile: apps/world-server/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/osia-${{ matrix.app }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
