name: osia-prod

# Deploy del world-server + Caddy (HTTPS/WSS automático) en una caja (Hetzner CX23).
#   1) En el server: cloná el repo y entrá a la carpeta.
#   2) Editá infra/Caddyfile con tu subdominio (ws.TU-DOMINIO.com).
#   3) Creá infra/.env.prod con WORLD_TICKET_SECRET / WORLD_CORS_ORIGINS / WORLD_PUBLIC_WS_URL.
#   4) docker compose -f infra/docker-compose.prod.yml --env-file infra/.env.prod up -d --build
#
# Redis NO se incluye: el world-server de Fase 0 mantiene el estado en memoria. Se agrega
# (managed) cuando haya varias instancias (escala — ver el análisis de deploy).

services:
  world-server:
    build:
      context: ..
      dockerfile: apps/world-server/Dockerfile
    container_name: osia-world
    restart: unless-stopped
    environment:
      NODE_ENV: production
      WORLD_SERVER_PORT: 2567
      WORLD_TICKET_SECRET: ${WORLD_TICKET_SECRET}
      WORLD_CORS_ORIGINS: ${WORLD_CORS_ORIGINS}
      WORLD_PUBLIC_WS_URL: ${WORLD_PUBLIC_WS_URL}
    expose:
      - '2567'

  caddy:
    image: caddy:2-alpine
    container_name: osia-caddy
    restart: unless-stopped
    depends_on:
      - world-server
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  caddy-data:
  caddy-config:
